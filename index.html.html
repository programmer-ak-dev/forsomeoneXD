<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For somebody</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: 'Poppins', sans-serif;
  }

  canvas {
    display: block;
  }

  .label {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    font-size: 6vw; /* responsive */
    color: white;
    opacity: 0.8;
  }

  /* 👇 start overlay (mobile fix) */
  .overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 24px;
    z-index: 10;
  }
</style>
</head>

<body>

<div class="label">Relax</div>

<div class="overlay" id="overlay">Tap to Start</div>

<audio id="music" loop>
  <source src="runaway_aurora_slow.mp3" type="audio/mpeg">
</audio>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

ctx.lineWidth = 2;

let branches = [];
let leaves = [];
let stars = [];
let nebula = [];

// ⭐ reduce for mobile performance
let STAR_COUNT = 80;
let NEBULA_COUNT = 4;

// ⭐ stars
for (let i = 0; i < STAR_COUNT; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speed: Math.random() * 0.3
  });
}

// 🌌 nebula
for (let i = 0; i < NEBULA_COUNT; i++) {
  nebula.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    radius: 150 + Math.random() * 150,
    color: `hsla(${Math.random()*360}, 80%, 60%, 0.08)`,
    dx: (Math.random() - 0.5) * 0.2,
    dy: (Math.random() - 0.5) * 0.2
  });
}

// 🌳 tree
function createTree(x, y, length, angle) {
  if (length < 10) {
    leaves.push({ x, y, baseAngle: angle });
    return;
  }

  const x2 = x + length * Math.cos(angle * Math.PI / 180);
  const y2 = y - length * Math.sin(angle * Math.PI / 180);

  branches.push({ x1: x, y1: y, x2, y2 });

  createTree(x2, y2, length * 0.7, angle + 30);
  createTree(x2, y2, length * 0.7, angle - 30);
}

createTree(canvas.width / 2, canvas.height, 100, 90);

let progress = 0;
let time = 0;

// 🌌 nebula
function drawNebula() {
  nebula.forEach(n => {
    let g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.radius);
    g.addColorStop(0, n.color);
    g.addColorStop(1, "transparent");

    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
    ctx.fill();

    n.x += n.dx;
    n.y += n.dy;

    if (n.x < 0 || n.x > canvas.width) n.dx *= -1;
    if (n.y < 0 || n.y > canvas.height) n.dy *= -1;
  });
}

// ⭐ stars
function drawStars() {
  ctx.fillStyle = "white";
  stars.forEach(s => {
    ctx.fillRect(s.x, s.y, s.size, s.size);

    s.y += s.speed;
    if (s.y > canvas.height) {
      s.y = 0;
      s.x = Math.random() * canvas.width;
    }
  });
}

// ❤️ leaf
function drawLeaf(x, y, size, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(size/2, -size/2, size, size/2, 0, size);

  ctx.strokeStyle = "pink";
  ctx.stroke();

  ctx.restore();
}

// 🎬 animation
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawNebula();
  drawStars();

  time += 0.05;
  progress += 0.004; // slower = smoother on phone
  if (progress > 1) progress = 1;

  let branchCount = Math.floor(branches.length * progress);
  for (let i = 0; i < branchCount; i++) {
    let b = branches[i];
    ctx.beginPath();
    ctx.moveTo(b.x1, b.y1);
    ctx.lineTo(b.x2, b.y2);
    ctx.strokeStyle = "brown";
    ctx.stroke();
  }

  let leafCount = Math.floor(leaves.length * progress);
  for (let i = 0; i < leafCount; i++) {
    let leaf = leaves[i];
    let sway = Math.sin(time) * 0.5;

    drawLeaf(
      leaf.x,
      leaf.y,
      10,
      (-leaf.baseAngle * Math.PI / 180) + sway
    );
  }

  requestAnimationFrame(animate);
}

// ▶️ start on tap (IMPORTANT for mobile)
document.getElementById("overlay").addEventListener("click", () => {
  document.getElementById("overlay").style.display = "none";
  document.getElementById("music").play();
  animate();
});
</script>

</body>
</html>
